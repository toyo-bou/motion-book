<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文字の余白</title>
  <meta
    name="description"
    content="読める文字の面を、移動するかたちが空白として横切るモーションブック。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400&family=M+PLUS+1+Code:wght@300;400&display=block"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@300;400&family=M+PLUS+1+Code:wght@300;400&display=block"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="start-screen">
    <section class="start-card" aria-labelledby="start-title">
      <p class="start-eyebrow">MOTION BOOK</p>
      <h1 id="start-title" class="start-title">文字の海を、選んだ言葉で始める。</h1>
      <p class="start-description">
        テキスト入力ボタンから文章をコピペ、または入力してからスタートしてください。入力した文字の中をキャラクターが動きます。
      </p>
      <div class="character-select" id="character-select">
        <p class="character-select-label">キャラクターを選ぶ</p>
        <div class="character-select-options">
          <label class="character-option">
            <input type="radio" name="character" value="fish" checked />
            <span class="character-option-card">
              <canvas class="character-preview" data-character="fish" width="120" height="80"></canvas>
              <span class="character-option-name">古代魚</span>
            </span>
          </label>
          <label class="character-option">
            <input type="radio" name="character" value="sprout" />
            <span class="character-option-card">
              <canvas class="character-preview" data-character="sprout" width="120" height="80"></canvas>
              <span class="character-option-name">モヤシの妖精</span>
            </span>
          </label>
        </div>
      </div>
      <div class="start-actions">
        <button
          id="toggle-input-button"
          class="start-button secondary"
          type="button"
          aria-expanded="false"
          aria-controls="text-modal"
        >
          テキスト入力
        </button>
        <button id="start-button" class="start-button primary" type="button" disabled>スタート</button>
      </div>
    </section>
  </div>
  <div id="text-modal" class="text-modal" hidden>
    <div class="text-modal-backdrop" data-close-input-modal></div>
    <section
      class="text-modal-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="text-modal-title"
    >
      <div class="text-modal-header">
        <p class="text-modal-eyebrow">TEXT INPUT</p>
        <button id="close-input-button" class="icon-button" type="button" aria-label="入力画面を閉じる">閉じる</button>
      </div>
      <h2 id="text-modal-title" class="text-modal-title">表示したい文章を入力</h2>
      <p class="text-modal-description">
        コピペでも直接入力でも使えます。改行はそのまま表示に反映され、文字数が少ないときは入力分だけ表示します。
      </p>
      <label class="text-modal-label" for="source-text">テキスト</label>
      <textarea
        id="source-text"
        spellcheck="false"
        placeholder="ここにテキストをコピペ、または入力します。"
      ></textarea>
      <div class="text-modal-actions">
        <button id="apply-input-button" class="start-button secondary" type="button">入力を閉じる</button>
      </div>
      <p class="editor-note">
        空欄のままなら既定テキストで開始します。
      </p>
    </section>
  </div>
  <div id="info-badge">
    <span id="fps-counter">0 FPS</span>
    <span id="char-count">0 chars</span>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
